<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>QuickPilot — 운전 중에 콜 하나 더 잡겠다고 뒤질 뻔한 적, 한두 번이 아닙니다</title>
<meta name="description" content="더럽고 열 받아서 내가 만들었다. 현장 기사가 직접 만드는 콜 자동배차·필터·정산 도구.">
<meta name="theme-color" content="#0a0a0a">
<meta property="og:title" content="QuickPilot">
<meta property="og:description" content="운전 중에 콜 하나 더 잡겠다고 뒤질 뻔한 적, 한두 번이 아닙니다. 더럽고 열 받아서 내가 만들었습니다.">
<meta property="og:type" content="website">

<!-- markdown 렌더링 -->
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
<!-- 편집 모드 마크다운 에디터 -->
<link rel="stylesheet" href="https://unpkg.com/easymde@2.18.0/dist/easymde.min.css">
<script src="https://unpkg.com/easymde@2.18.0/dist/easymde.min.js" defer></script>

<style>
  :root {
    --bg: #0a0a0a;
    --fg: #f5f5f5;
    --dim: #9a9a9a;
    --hot: #ff3b30;
    --line: #1f1f1f;
    --card: #131313;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: var(--bg); color: var(--fg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Noto Sans KR", "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    line-height: 1.65;
    font-size: 17px;
    word-break: keep-all;
    overflow-wrap: anywhere;
    -webkit-font-smoothing: antialiased;
  }
  main { max-width: 640px; margin: 0 auto; padding: 0 22px 80px; }
  section { padding: 56px 0; border-bottom: 1px solid var(--line); position: relative; }
  section:last-of-type { border-bottom: 0; }

  /* 마크다운 콘텐츠 안의 bold = 빨강 강조 */
  .md strong { color: var(--hot); font-weight: 700; }
  .md em { color: var(--dim); font-style: italic; }
  .md p { color: var(--fg); margin-bottom: 14px; }
  .md ul { list-style: none; margin: 0 0 14px; padding: 0; }
  .md ul li {
    position: relative;
    padding-left: 18px;
    margin-bottom: 10px;
    font-size: 18px;
    line-height: 1.55;
  }
  .md ul li::before {
    content: "·"; color: var(--hot); font-weight: 800;
    position: absolute; left: 4px; top: -2px; font-size: 22px;
  }
  .md h3 {
    font-size: 22px; line-height: 1.4; font-weight: 700;
    margin: 28px 0 14px; color: #ffffff;
  }
  .md h3:first-child { margin-top: 8px; }
  .md blockquote {
    border-left: 3px solid var(--hot);
    padding: 4px 0 4px 12px;
    margin: 18px 0;
    color: var(--dim); font-size: 14px;
  }

  /* HERO */
  .hero { padding: 88px 0 64px; border-bottom: 1px solid var(--line); }
  .hero .tag {
    display: inline-block; font-size: 13px; letter-spacing: 0.08em;
    color: var(--hot); font-weight: 700; margin-bottom: 22px;
  }
  .hero .md p { font-size: 30px; line-height: 1.35; font-weight: 800;
    letter-spacing: -0.01em; color: #ffffff; }
  .hero .md strong { color: var(--hot); }
  .hero .md.sub { margin-top: 22px; }
  .hero .md.sub p { color: var(--dim); font-size: 15px; font-weight: 400; }

  /* SECTION HEADER */
  .sec-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 18px;
  }
  h2 {
    font-size: 13px; letter-spacing: 0.14em; color: var(--hot);
    font-weight: 800; text-transform: uppercase;
  }

  /* EDIT BUTTON */
  .edit-btn {
    background: transparent; border: 1px solid var(--line);
    color: var(--dim); font-size: 12px; padding: 6px 10px;
    border-radius: 6px; cursor: pointer; font-family: inherit;
  }
  .edit-btn:hover { color: var(--hot); border-color: var(--hot); }

  /* MANIFESTO */
  .manifesto .md p { font-size: 18px; line-height: 1.75; margin-bottom: 18px; }
  .manifesto .md blockquote { font-size: 14px; }

  /* DEMO */
  .demo-frame {
    margin: 24px auto;
    width: 100%; max-width: 340px;
    aspect-ratio: 9 / 18;
    border: 8px solid #1c1c1c; border-radius: 38px;
    background: #050505;
    box-shadow: 0 8px 40px rgba(255, 59, 48, 0.10);
    display: flex; align-items: center; justify-content: center;
    color: #4a4a4a; font-size: 13px; text-align: center; padding: 20px;
  }

  /* CTA */
  .cta { padding: 72px 0 24px; }
  .btn {
    display: block; width: 100%;
    background: var(--hot); color: #ffffff;
    text-align: center; font-weight: 800; font-size: 17px;
    padding: 18px 22px; border-radius: 12px;
    text-decoration: none; margin-top: 18px; border: 0; cursor: pointer;
  }
  .btn:active { transform: translateY(1px); }
  .small {
    color: var(--dim); font-size: 13px; margin-top: 16px; text-align: center;
  }

  footer {
    color: #555; font-size: 12px; text-align: center;
    padding: 32px 22px 60px; border-top: 1px solid var(--line);
  }

  /* EDIT MODE OVERLAY */
  .edit-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85);
    z-index: 100; display: none;
    align-items: center; justify-content: center; padding: 20px;
  }
  .edit-overlay.on { display: flex; }
  .edit-panel {
    background: #131313; border: 1px solid var(--line); border-radius: 12px;
    width: 100%; max-width: 720px; max-height: 90vh;
    display: flex; flex-direction: column;
  }
  .edit-panel header {
    padding: 16px 20px; border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .edit-panel header h3 { font-size: 14px; color: var(--hot); font-weight: 700; letter-spacing: 0.08em; }
  .edit-panel header .x {
    background: transparent; border: 0; color: var(--dim);
    font-size: 22px; cursor: pointer;
  }
  .edit-panel .body { padding: 16px 20px; overflow-y: auto; flex: 1; }
  .edit-panel footer {
    padding: 14px 20px; border-top: 1px solid var(--line);
    display: flex; gap: 10px; justify-content: flex-end;
    border-bottom: 0; background: none;
  }
  .edit-panel footer button {
    padding: 10px 18px; border-radius: 8px;
    font-size: 14px; font-weight: 700; cursor: pointer;
    font-family: inherit; border: 0;
  }
  .btn-save { background: var(--hot); color: #fff; }
  .btn-cancel { background: transparent; border: 1px solid var(--line); color: var(--dim); }
  .input {
    width: 100%; padding: 10px 12px; background: #050505;
    border: 1px solid var(--line); color: var(--fg);
    border-radius: 6px; font-family: monospace; font-size: 13px;
  }
  .input:focus { border-color: var(--hot); outline: none; }
  .help { color: var(--dim); font-size: 13px; margin: 12px 0; line-height: 1.6; }
  .help a { color: var(--hot); }
  .status { font-size: 13px; margin-top: 10px; }
  .status.ok { color: #4ade80; }
  .status.err { color: var(--hot); }

  /* EasyMDE dark tweaks */
  .EasyMDEContainer .CodeMirror,
  .EasyMDEContainer .editor-preview,
  .EasyMDEContainer .editor-toolbar {
    background: #0a0a0a; color: var(--fg); border-color: var(--line);
  }
  .EasyMDEContainer .CodeMirror-cursor { border-color: var(--hot); }
  .EasyMDEContainer .editor-toolbar button { color: var(--dim); }
  .EasyMDEContainer .editor-toolbar button:hover,
  .EasyMDEContainer .editor-toolbar button.active { background: #1f1f1f; color: var(--hot); }

  @media (min-width: 720px) {
    body { font-size: 18px; }
    .hero .md p { font-size: 40px; }
  }
</style>
</head>
<body>
<main>

  <!-- 1. HERO -->
  <header class="hero">
    <div class="tag">QUICKPILOT · 베타 테스터 모집</div>
    <div class="sec-head">
      <span style="display:none">hero</span>
      <button class="edit-btn" data-edit="hero">✏ 편집</button>
    </div>
    <div class="md" data-content="hero">로딩 중…</div>
    <div class="md sub" data-content="hero-sub"></div>
  </header>

  <!-- 2. 빌드업 -->
  <section>
    <div class="sec-head">
      <h2>여기까지 어떻게 왔는가</h2>
      <button class="edit-btn" data-edit="buildup">✏ 편집</button>
    </div>
    <div class="md" data-content="buildup">로딩 중…</div>
  </section>

  <!-- 3. 어디까지 왔고 -->
  <section>
    <div class="sec-head">
      <h2>어디까지 왔고 무엇이 가능한가</h2>
      <button class="edit-btn" data-edit="now">✏ 편집</button>
    </div>
    <div class="md" data-content="now">로딩 중…</div>
  </section>

  <!-- 4. MANIFESTO -->
  <section class="manifesto">
    <div class="sec-head">
      <h2>한 가지 부탁드립니다</h2>
      <button class="edit-btn" data-edit="manifesto">✏ 편집</button>
    </div>
    <div class="md" data-content="manifesto">로딩 중…</div>
  </section>

  <!-- 5. VISION -->
  <section>
    <div class="sec-head">
      <h2>어디로 가는가</h2>
      <button class="edit-btn" data-edit="vision">✏ 편집</button>
    </div>
    <div class="md" data-content="vision">로딩 중…</div>
  </section>

  <!-- 6. DEMO -->
  <section>
    <div class="sec-head">
      <h2>직접 느껴보세요</h2>
      <button class="edit-btn" data-edit="demo">✏ 편집</button>
    </div>
    <div class="md" data-content="demo">로딩 중…</div>
    <div class="demo-frame">여기 폰 화면 박힙니다.<br>곧 손가락으로 직접 눌러 보실 수 있습니다.</div>
  </section>

  <!-- 7. CTA -->
  <section class="cta">
    <div class="sec-head">
      <h2>베타 테스터 모집</h2>
      <button class="edit-btn" data-edit="cta">✏ 편집</button>
    </div>
    <div class="md" data-content="cta">로딩 중…</div>
    <a class="btn" href="#apply">베타 테스터 신청하기</a>
    <p class="small">폼 준비 중입니다. 며칠 안에 작동합니다.</p>
  </section>

</main>

<footer>
  © QuickPilot · 현장 기사가 직접 만드는 도구
</footer>

<!-- EDIT MODE OVERLAY -->
<div class="edit-overlay" id="overlay">
  <div class="edit-panel">
    <header>
      <h3 id="edit-title">편집</h3>
      <button class="x" onclick="closeEdit()">×</button>
    </header>
    <div class="body" id="edit-body"></div>
    <footer>
      <button class="btn-cancel" onclick="closeEdit()">취소</button>
      <button class="btn-save" onclick="saveEdit()">저장 + Push</button>
    </footer>
  </div>
</div>

<script src="admin.js" defer></script>
</body>
</html>
